data:
  train_csv: "./data/normal.csv"
  test_csv: "./data/merged.csv"
  timestamp_col: "Timestamp"
  label_col: "Normal/Attack"
  normal_label: "Normal"
  val_ratio: 0.2
  window_size: 60
  stride: 1
  horizon: 1
  label_mode: "future"
  corr_threshold: 0.3

model:
  hidden_dim: 64
  gat_heads: 4
  gru_hidden: 64
  tcn_channels: 64
  tcn_blocks: 2
  dropout: 0.2

train:
  seed: 42
  batch_size: 64
  epochs: 30
  lr: 0.001
  weight_decay: 0.00001
  lambda_pred: 0.5
  device: "cuda"
  num_workers: 0
  amp: true
  lr_patience: 5
  early_stop_patience: 10

score:
  topk: 5
  threshold_quantile: 0.995

output:
  save_dir: "./outputs/swat_normal_train_merged_test"
